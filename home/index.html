<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gentry Timepieces</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/watch-image-generator.js" defer></script>
  <script src="../js/watches-api.js" defer></script>
  <script src="../js/api-config.js" defer></script>
  <script src="../js/component-loader.js" defer></script>
  <style>
    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: #111;
      margin: 10% auto;
      padding: 30px;
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 10px;
      width: 90%;
      max-width: 500px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .close-modal {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .close-modal:hover {
      color: #D4AF37;
    }

    .modal h2 {
      color: #D4AF37;
      margin-bottom: 10px;
    }

    .modal-info {
      margin-bottom: 20px;
      font-size: 14px;
      color: #aaa;
    }

    .modal-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .modal-form input, .modal-form textarea {
      padding: 12px;
      background: #000;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      border-radius: 5px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
    }

    .modal-form input:focus, .modal-form textarea:focus {
      outline: none;
      border-color: #D4AF37;
      box-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
    }

    .modal-btn {
      padding: 12px;
      background: #D4AF37;
      color: #000;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      min-height: 44px;
      transition: 0.3s;
    }

    .modal-btn:hover {
      opacity: 0.9;
    }

    .modal-btn-cancel {
      background: #333;
      color: #fff;
    }

    .modal-btn-container {
      display: flex;
      gap: 10px;
    }

    .modal-btn-container button {
      flex: 1;
    }

    @media (max-width: 480px) {
      .modal-content {
        width: 95%;
        margin: 30% auto;
        padding: 20px;
      }

      .modal-btn-container {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div id="header-placeholder"></div>
 
  <section class="hero">
    <div>
      <h1>Luxury in Every Second</h1>
      <button id="explore-btn">Explore Collection</button>
    </div>
  </section>

  <section class="products" id="products-section">
    <div id="watches-container" style="grid-column: 1 / -1; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px;">
      <!-- Watches loaded from API -->
    </div>
  </section>

  <!-- Book Viewing Modal -->
  <div id="bookViewingModal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h2>Book a Viewing</h2>
      <div class="modal-info">
        Watch: <strong id="selected-watch"></strong>
      </div>
      <form class="modal-form" id="booking-form">
        <input type="text" id="visitor-name" placeholder="Your Name" required>
        <input type="email" id="visitor-email" placeholder="Your Email" required>
        <input type="tel" id="visitor-phone" placeholder="Your Phone" required>
        <textarea id="visitor-message" placeholder="Any questions or special requests?"></textarea>
        <div class="modal-btn-container">
          <button type="submit" class="modal-btn">Request Viewing</button>
          <button type="button" class="modal-btn modal-btn-cancel" onclick="closeBookingModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script>
    /**
     * Book Viewing Modal Functionality
     */
    const modal = document.getElementById('bookViewingModal');
    const bookViewingBtns = document.querySelectorAll('.book-viewing-btn');
    const closeBtn = document.querySelector('.close-modal');
    const bookingForm = document.getElementById('booking-form');

    // Open modal when "Book Viewing" button is clicked
    bookViewingBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const watchName = btn.getAttribute('data-watch');
        document.getElementById('selected-watch').textContent = watchName;
        modal.style.display = 'block';
      });
    });

    // Close modal when X is clicked
    closeBtn.addEventListener('click', () => {
      modal.style.display = 'none';
    });

    // Close modal when clicking outside of it
    window.addEventListener('click', (event) => {
      if (event.target === modal) {
        modal.style.display = 'none';
      }
    });

    // Handle form submission
    bookingForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('visitor-name').value;
      const email = document.getElementById('visitor-email').value;
      const phone = document.getElementById('visitor-phone').value;
      const message = document.getElementById('visitor-message').value;
      const watch = document.getElementById('selected-watch').textContent;

      // Log booking data (in production, send to backend API)
      console.log('Viewing booked:', { name, email, phone, watch, message });

      alert('Thank you! We will contact you shortly to confirm your viewing.');
      modal.style.display = 'none';
      bookingForm.reset();
    });

    /**
     * Close booking modal from outside
     */
    function closeBookingModal() {
      modal.style.display = 'none';
      bookingForm.reset();
    }

    /**
     * Explore Collection button - scroll to products
     */
    document.getElementById('explore-btn').addEventListener('click', () => {
      const productsSection = document.getElementById('products-section');
      productsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    /**
     * Load Featured Watches from API
     */
    async function loadFeaturedWatches() {
      // Wait for API to initialize
      await new Promise(resolve => setTimeout(resolve, 1500));

      if (typeof watchAPI === 'undefined' || !watchAPI) {
        console.error('Watch API not available');
        return;
      }

      const featuredWatches = ['rolex submariner', 'omega seamaster', 'patek philippe'];
      const container = document.getElementById('watches-container');
      
      for (const watchName of featuredWatches) {
        try {
          const results = await watchAPI.searchWatches(watchName);
          if (results && results.length > 0) {
            const watch = results[0]; // Get first result
            const card = createWatchCard(watch);
            container.appendChild(card);
          }
        } catch (error) {
          console.error(`Error loading ${watchName}:`, error);
        }
      }
    }

    /**
     * Create watch card element
     */
    function createWatchCard(watch) {
      const div = document.createElement('div');
      div.className = 'card';
      
      // Generate image using WatchImageGenerator
      const imageDataUrl = typeof WatchImageGenerator !== 'undefined' 
        ? WatchImageGenerator.getWatchImageDataURL(watch.brand, watch.model)
        : 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzAwIiBoZWlnaHQ9IjMwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMzAwIiBoZWlnaHQ9IjMwMCIgZmlsbD0iIzExMSIvPjwvc3ZnPg==';

      div.innerHTML = `
        <img src="${imageDataUrl}" alt="${watch.model}" style="width: 100%; height: 200px; object-fit: cover; border-radius: 10px;">
        <h3>${watch.model || watch.brand}</h3>
        <p style="color: #D4AF37; font-size: 12px; margin: 5px 0;">${watch.brand}</p>
        <p style="color: #aaa; font-size: 12px; margin: 5px 0;">Ref: ${watch.reference_number || 'N/A'}</p>
        <button class="book-viewing-btn" data-watch="${watch.model}">Book Viewing</button>
      `;

      return div;
    }

    // Load featured watches when page loads
    document.addEventListener('DOMContentLoaded', () => {
      loadFeaturedWatches();
    });
  </script>
</body>
</html>
