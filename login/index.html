<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Gentry Timepieces</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@100;200;300;400&display=swap&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/luxury-style.css">
  <script src="../js/component-loader.js" defer></script>
  <style>
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 70vh;
      padding: 20px;
    }

    .login-box {
      background: #111;
      border: 1px solid rgba(212, 175, 55, 0.3);
      padding: 40px;
      border-radius: 10px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .login-box h2 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: #D4AF37;
      margin-bottom: 10px;
      text-align: center;
    }

    .login-subtitle {
      text-align: center;
      color: #aaa;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #D4AF37;
      font-weight: 500;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      background: #000;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      border-radius: 5px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      min-height: 44px;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #D4AF37;
      box-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
    }

    .form-group input::placeholder {
      color: #666;
    }

    .error-message {
      color: #f44336;
      font-size: 12px;
      margin-top: 5px;
      display: none;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: #D4AF37;
      color: #000;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      min-height: 44px;
      transition: 0.3s;
      margin-top: 10px;
    }

    .login-btn:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    .login-links {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }

    .login-links a {
      color: #D4AF37;
      text-decoration: none;
      transition: 0.3s;
    }

    .login-links a:hover {
      color: #fff;
    }

    .register-link {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .alert {
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .alert-success {
      background: #1a4d2e;
      border: 1px solid #4caf50;
      color: #4caf50;
    }

    .alert-error {
      background: #5d1f1f;
      border: 1px solid #f44336;
      color: #f44336;
    }

    @media (max-width: 480px) {
      .login-box {
        padding: 20px;
      }

      .login-box h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <div class="login-container">
    <div class="login-box">
      <h2>Login</h2>
      <p class="login-subtitle">Access your Gentry Timepieces account</p>

      <div id="alert" class="alert"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required>
          <div class="error-message" id="email-error">Please enter a valid email</div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
          <div class="error-message" id="password-error">Password must be at least 6 characters</div>
        </div>

        <button type="submit" class="login-btn">Sign In</button>
      </form>

      <div class="login-links">
        <a href="#forgot-password">Forgot Password?</a>
        <div class="register-link">
          Don't have an account? <a href="#register">Register here</a>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script>
    /**
     * Login Form Validation & Security
     */
    const loginForm = document.getElementById('login-form');
    const alertBox = document.getElementById('alert');

    /**
     * Validate email format
     */
    function isValidEmail(email) {
      const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return regex.test(email);
    }

    /**
     * Validate password strength
     */
    function isValidPassword(password) {
      return password && password.length >= 6;
    }

    /**
     * Show error message
     */
    function showError(fieldId, message) {
      const errorEl = document.getElementById(`${fieldId}-error`);
      if (errorEl) {
        errorEl.textContent = message;
        errorEl.style.display = 'block';
      }
    }

    /**
     * Hide error message
     */
    function hideError(fieldId) {
      const errorEl = document.getElementById(`${fieldId}-error`);
      if (errorEl) {
        errorEl.style.display = 'none';
      }
    }

    /**
     * Show alert message
     */
    function showAlert(message, type = 'error') {
      alertBox.textContent = message;
      alertBox.className = `alert alert-${type}`;
      alertBox.style.display = 'block';
    }

    /**
     * Hide alert message
     */
    function hideAlert() {
      alertBox.style.display = 'none';
    }

    /**
     * Validate form
     */
    function validateForm() {
      let isValid = true;

      const email = document.getElementById('email').value;
      if (!isValidEmail(email)) {
        showError('email', 'Please enter a valid email address');
        isValid = false;
      } else {
        hideError('email');
      }

      const password = document.getElementById('password').value;
      if (!isValidPassword(password)) {
        showError('password', 'Password must be at least 6 characters');
        isValid = false;
      } else {
        hideError('password');
      }

      return isValid;
    }

    /**
     * Handle form submission
     */
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      hideAlert();

      if (!validateForm()) {
        showAlert('Please fix the errors above', 'error');
        return;
      }

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Log login attempt (in production, send to backend API with HTTPS)
      console.log('Login attempt:', { email });

      // Simulate successful login (replace with actual API call)
      showAlert('Login successful! Redirecting...', 'success');
      
      setTimeout(() => {
        // In production, redirect to dashboard after successful login
        console.log('Redirecting to dashboard...');
        // window.location.href = './dashboard.html';
      }, 1500);

      // Clear form
      loginForm.reset();
    });

    /**
     * Real-time email validation
     */
    document.getElementById('email').addEventListener('blur', () => {
      const email = document.getElementById('email').value;
      if (email && !isValidEmail(email)) {
        showError('email', 'Please enter a valid email address');
      } else {
        hideError('email');
      }
    });
  </script>
</body>
</html>
